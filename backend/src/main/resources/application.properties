spring.application.name=ajaysmarketplace

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketplace}
spring.datasource.username=${DB_USER:marketplace_user}
spring.datasource.password=${DB_PASSWORD:marketplace_pass}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

logging.level.org.springframework.jdbc=DEBUG

# JWT
jwt.secret=${jwt_secret}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Cookies
cookie.secure=true
